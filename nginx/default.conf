# SubBoard - 1Panel Nginx Site Config
# 在 1Panel -> 网站 -> 创建网站 -> 反向代理 中使用，或手动粘贴到站点配置

# 后端上游
upstream subboard_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen 443 ssl http2;
    server_name _;

    # SSL 证书路径（1Panel 管理证书时会自动填充，HTTP 部署可删除 ssl 相关行）
    # ssl_certificate     /etc/nginx/ssl/subboard.cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/subboard.key.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    # 前端静态文件
    root /opt/subboard/frontend/dist;
    index index.html;

    # SPA 路由 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://subboard_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # 订阅链接反向代理
    location /sub/ {
        proxy_pass http://subboard_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
